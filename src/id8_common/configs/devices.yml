hklpy2.creator:
- name: sim_psic
  geometry: E6C
  solver: hkl_soleil
  reals: [ "mu", "eta", "chi", "phi", "nu", "delta" ]  # psic names
  labels: [ "diffractometer" ]
- name: psic
  geometry: E6C
  solver: hkl_soleil
  prefix: "8ideSoft:CR8-E1:"  
  labels: [ "diffractometer" ]
  reals:
    mu: m6
    eta: m7
    chi: m8
    phi: m9
    nu: m4
    delta: m5

