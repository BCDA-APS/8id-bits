# Copy of devices.yml with heartbeat_pv added to each real device.
# heartbeat_pv: a PV that responds iff the device's IOC is up.
# Simulator devices (apsbits.utils.sim_creator) have no heartbeat_pv — they always load.
# hklpy2 entries have no heartbeat_pv; the underlying motors are checked via huber.

id8_common.devices.fofb:
  - name: fofb_s09
    prefix: S09-FOFB
    heartbeat_pv: S09-FOFB:H:LoopStatusM

apsbits.utils.sim_creator.predefined_device:
  - creator: ophyd.sim.motor
    name: sim_motor
  - creator: ophyd.sim.noisy_det
    name: sim_det

ophyd.EpicsMotor:
  # prefix IS the full motor record name, so heartbeat = prefix + ".VAL"
  - name: fl2
    prefix: 8ideSoft:CR8-E2:m7
    labels: ["motor"]
    heartbeat_pv: "8ideSoft:CR8-E2:m7.VAL"
  - name: fl3
    prefix: 8idiSoft:CR8-I2:m7
    labels: ["motor"]
    heartbeat_pv: "8idiSoft:CR8-I2:m7.VAL"
  - name: flag4
    prefix: 8iddSoft:CR8-D1:m1
    labels: ["motor"]
    heartbeat_pv: "8iddSoft:CR8-D1:m1.VAL"

id8_common.devices.xy_motors.XY_Motors:
  # prefix="" so _x_pv = x_motor directly
- name: cam_stage_8idi
  prefix: ""
  x_motor: 8ide:m13
  y_motor: 8idiSoft:CR8-I2:m15
  heartbeat_pv: "8ide:m13.VAL"

