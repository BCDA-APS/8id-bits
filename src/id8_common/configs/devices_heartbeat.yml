hklpy2.creator:
  # sim_psic is a pure simulator — no heartbeat_pv
  # psic uses real motors on 8ideSoft:CR8-E1: (same IOC as huber)
- name: sim_psic
  geometry: E6C
  solver: hkl_soleil
  reals: [ "mu", "eta", "chi", "phi", "nu", "delta" ]
  labels: [ "diffractometer" ]
- name: psic
  geometry: E6C
  solver: hkl_soleil
  prefix: "8ideSoft:CR8-E1:"
  labels: [ "diffractometer" ]
  reals:
    mu: m6
    eta: m7
    chi: m8
    phi: m9
    nu: m4
    delta: m5
  heartbeat_pv: "8ideSoft:CR8-E1:m4.VAL"

id8_common.devices.pin_diode.PIND:
